name: CD - Forum API Deployment

on:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: forumapi_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run database migrations
        run: npm run migrate:test
        env:
          PGHOST: localhost
          PGPORT: 5432
          PGUSER: postgres
          PGPASSWORD: postgres
          PGDATABASE: forumapi_test

      - name: Run tests
        run: npm test
        env:
          PGHOST_TEST: localhost
          PGPORT_TEST: 5432
          PGUSER_TEST: postgres
          PGPASSWORD_TEST: postgres
          PGDATABASE_TEST: forumapi_test
          ACCESS_TOKEN_KEY: supersecretaccesstokenkey123456
          REFRESH_TOKEN_KEY: supersecretrefreshtokenkey654321
          ACCESS_TOKEN_AGE: 3000

      - name: Generate coverage report
        run: npm run test:coverage
        env:
          PGHOST_TEST: localhost
          PGPORT_TEST: 5432
          PGUSER_TEST: postgres
          PGPASSWORD_TEST: postgres
          PGDATABASE_TEST: forumapi_test
          ACCESS_TOKEN_KEY: supersecretaccesstokenkey123456
          REFRESH_TOKEN_KEY: supersecretrefreshtokenkey654321
          ACCESS_TOKEN_AGE: 3000

  deploy:
    runs-on: ubuntu-latest
    needs: test
    if: success()

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy notification
        run: |
          echo "✅ All tests passed. Ready for deployment."
          echo "🚀 Deploying to Railway.app..."
          echo ""
          echo "The deployment will be handled by Railway.app's GitHub integration."
          echo "Make sure the following secrets are configured in Railway:"
          echo "  - PGHOST"
          echo "  - PGPORT"
          echo "  - PGUSER"
          echo "  - PGPASSWORD"
          echo "  - PGDATABASE"
          echo "  - ACCESS_TOKEN_KEY"
          echo "  - REFRESH_TOKEN_KEY"
          echo "  - ACCESS_TOKEN_AGE"
          echo ""
          echo "⏳ Deployment in progress..."

      - name: Wait for Railway deployment
        run: |
          echo "Waiting 30 seconds for Railway to process the deployment..."
          sleep 30

      - name: Health check
        continue-on-error: true
        run: |
          echo "🔍 Checking if the API is responding..."
          for attempt in {1..5}; do
            echo "Attempt $attempt of 5..."
            if curl -f -s https://forum-api-production-decc.up.railway.app/ > /dev/null 2>&1; then
              echo "✅ API is responding!"
              exit 0
            fi
            sleep 10
          done
          echo "⚠️  Could not reach API yet. Check Railway logs for details."
          echo "🔗 Railway Dashboard: https://railway.app"
          exit 0

      - name: Deployment summary
        run: |
          echo "✅ Deployment workflow completed"
          echo ""
          echo "📝 Summary:"
          echo "  - All tests: PASSED"
          echo "  - Code deployment: INITIATED"
          echo "  - Status: Check Railway.app dashboard for real-time updates"
          echo ""
          echo "🔗 Important links:"
          echo "  - Production API: https://forum-api-production-decc.up.railway.app/"
          echo "  - Railway Dashboard: https://railway.app/project/..."
          echo "  - GitHub Actions: $GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"
