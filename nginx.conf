# NGINX Configuration for Forum API
# This configuration file handles:
# 1. HTTP to HTTPS redirection
# 2. Reverse proxy to Forum API application
# 3. Rate limiting for /threads resource (90 requests per minute)
# 4. Security headers and caching policies

# Rate limiting zone for /threads endpoint
# Limit to 90 requests per minute (1.5 requests per second)
limit_req_zone $binary_remote_addr zone=threads_limit:10m rate=1.5r/s;

# Upstream to Forum API application
upstream forum_api {
    server localhost:5000;
    keepalive 32;
}

# HTTP server block - redirect to HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name _;

    # Redirect all HTTP traffic to HTTPS
    return 301 https://$host$request_uri;
}

# HTTPS server block
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.forum.local; # Change this to your actual domain

    # SSL/TLS Configuration
    ssl_certificate /etc/nginx/ssl/forum-api.crt;
    ssl_certificate_key /etc/nginx/ssl/forum-api.key;

    # Modern SSL configuration
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Logging
    access_log /var/log/nginx/forum_api_access.log;
    error_log /var/log/nginx/forum_api_error.log;

    # Client body size limit
    client_max_body_size 10M;

    # Compression
    gzip on;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/json;
    gzip_min_length 1000;

    # Proxy settings
    proxy_connect_timeout 60s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;

    # Location for /threads with rate limiting
    location /threads {
        # Apply rate limiting: 90 requests per minute (1.5 r/s)
        limit_req zone=threads_limit nodelay;

        # Proxy configuration
        proxy_pass http://forum_api;
        proxy_http_version 1.1;
        
        # Preserve original request headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $server_name;
        
        # Connection settings
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_request_buffering off;
    }

    # Proxy all other locations to Forum API
    location / {
        proxy_pass http://forum_api;
        proxy_http_version 1.1;
        
        # Preserve original request headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $server_name;
        
        # Connection settings
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_request_buffering off;
    }

    # Health check endpoint (no rate limiting)
    location /health {
        access_log off;
        proxy_pass http://forum_api;
        proxy_set_header Host $host;
    }

    # Deny access to sensitive files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    location ~ ~$ {
        deny all;
        access_log off;
        log_not_found off;
    }
}
