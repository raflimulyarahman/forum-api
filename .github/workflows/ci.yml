name: CI - Forum API Tests

on:
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: forumapi_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run database migrations
        run: npm run migrate:test
        env:
          PGHOST: localhost
          PGPORT: 5432
          PGUSER: postgres
          PGPASSWORD: postgres
          PGDATABASE: forumapi_test

      - name: Run tests
        run: npm test
        env:
          PGHOST_TEST: localhost
          PGPORT_TEST: 5432
          PGUSER_TEST: postgres
          PGPASSWORD_TEST: postgres
          PGDATABASE_TEST: forumapi_test
          ACCESS_TOKEN_KEY: supersecretaccesstokenkey123456
          REFRESH_TOKEN_KEY: supersecretrefreshtokenkey654321
          ACCESS_TOKEN_AGE: 3000

      - name: Generate coverage report
        run: npm run test:coverage
        env:
          PGHOST_TEST: localhost
          PGPORT_TEST: 5432
          PGUSER_TEST: postgres
          PGPASSWORD_TEST: postgres
          PGDATABASE_TEST: forumapi_test
          ACCESS_TOKEN_KEY: supersecretaccesstokenkey123456
          REFRESH_TOKEN_KEY: supersecretrefreshtokenkey654321
          ACCESS_TOKEN_AGE: 3000
